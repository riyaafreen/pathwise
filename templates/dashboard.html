<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Registered Students</h1>

<table border="1">

<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Career</th>
</tr>

{% for student in students %}

<tr>
    <td>{{ student.name }}</td>
    <td>{{ student.email }}</td>
    <td>{{ student.career }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
